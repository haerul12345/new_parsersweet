                        --bg-dark: #fbf0f3;
                        --card-bg: #ffffff;

                body {
                        font-family: var(--font-family);
                        margin: 0;
                        padding: 40px 20px;
                        background: var(--bg-dark);
                        color: var(--text-bright);
                        transition: background 0.5s ease, color 0.3s ease;
                }

                .utility-bar {
                        width: 95%;
                        max-width: 100%;
                        /* match index.html */
                        display: flex;
                        justify-content: flex-end;
                        /* margin: 0 auto 15px; */
                        margin: 0 auto 0;
                        position: relative;
                        z-index: 3;
                        margin-top: -6px;
                        margin-bottom: 16px;
                        /* lift slightly to sit above the container */
                }

                .flavor-toggle {
                        background: var(--card-bg);
                        border: 1px solid var(--border-color);
                        padding: 8px 18px;
                        border-radius: 20px;
                        color: var(--text-bright);
                        font-family: inherit;
                        font-size: 0.85rem;
                        font-weight: 500;
                        cursor: pointer;
                        display: flex;
                        align-items: center;
                        gap: 8px;
                        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
                        transition: all 0.24s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                }

                .flavor-toggle:hover {
                        transform: scale(1.05);
                        border-color: rgba(155, 93, 229, 0.6);
                        /* background: var(--card-hover-bg); */
                        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
                }

                body.sweet-mode .flavor-toggle:hover {
                        transform: scale(1.05);
                        /* background: var(--card-hover-bg); */
                        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
                }

                /* stronger contrast for the toggle in sweet mode */
                body.sweet-mode .flavor-toggle {
                        background: linear-gradient(135deg, #F9A8D4, #C084FC);
                        border-color: rgba(155, 93, 229, 0.32);
                        box-shadow: 0 10px 30px rgba(155, 93, 229, 0.08);
                        color: #2d1e2f;
                        /* dark text for readability */
                        transform: translateY(-2px);
                        padding: 10px 20px;
                }

                /* improved contrast for bitter (dark) mode */
                body:not(.sweet-mode) .flavor-toggle {
                        background: linear-gradient(135deg, #6D4C8A, #251A2B);
                        border-color: rgba(255, 255, 255, 0.06);
                        color: var(--text-bright);
                        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.04);
                        padding: 9px 18px;
                }

                .page-wrapper {
                        width: 100%;
                        max-width: 100%;
                        margin: 0 auto;
                }

                .container {
                        max-width: 90%;
                        width: 100%;
                        margin: 0 auto;
                        background: var(--card-bg);
                        padding: 30px;
                        border-radius: 32px;
                        border: 1px solid var(--border-color);
                        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
                        border-top: 1px solid var(--border-color);
                        border-right: 1px solid var(--border-color);
                        border-bottom: 1px solid var(--border-color);
                        border-left: 1px solid var(--border-color);
                        position: relative;
                        z-index: 1;
                }

                .flex-container {
                        display: flex;
                        gap: 20px;
                        /* Increased gap between input and output */
                }

                .input-container {
                        flex: 1;
                        display: flex;
                        flex-direction: column;
                        gap: 20px;
                        width: 50%;
                        /* Set width to half */
                }

                textarea {
                        resize: vertical;
                        width: 100%;
                        min-height: 120px;
                }

                h1 {
                        margin-bottom: 12px;
                        background: var(--title-gradient);
                        -webkit-background-clip: text;
                        -webkit-text-fill-color: transparent;
                }

                p {
                        color: var(--text-muted);
                        line-height: 1.6;
                }

                .btn {
                        padding: 12px 24px;
                        border: 1px solid var(--border-color);
                        border-radius: 30px;
                        font-size: 1em;
                        cursor: pointer;
                        transition: transform 0.18s ease, background 0.22s ease, border-color 0.18s ease;
                        background: var(--card-bg);
                        color: var(--text-bright);
                }

                body:not(.sweet-mode) .btn,
                body:not(.sweet-mode) #copy-button {

                        background: #4C3A63;
                        color: white;
                        border-color: rgba(255, 255, 255, 0.12);
                }

                body.sweet-mode .btn,
                body.sweet-mode #copy-button {
                        /*             background: #EC4899;
            color: white;
            border-color: rgba(192, 132, 252, 0.6); */


                        background: #7aaec2;
                        color: white;
                        border: 1px solid #6da3b8;


                }

                .btn:hover {
                        transform: scale(1.05);
                        filter: brightness(0.80);
                }

                #copy-button {
                        display: none;
                        margin-left: 20px;
                        padding: 12px 24px;
                        border: 1px solid var(--border-color);
                        border-radius: 30px;
                        background: var(--card-bg);
                        color: var(--text-bright);
                        cursor: pointer;
                        transition: transform 0.18s ease, background 0.22s ease, border-color 0.18s ease;
                }

                /* hover states for buttons */
                .btn:hover,
                #copy-button:hover {
                        transform: scale(1.05);
                        background: var(--card-hover-bg);
                        border-color: rgba(155, 93, 229, 0.35);
                        color: var(--text-bright);
                }

                .info-alert {
                        position: fixed;
                        bottom: 30px;
                        right: 140px;
                        transform: translate(-50%);
                        transform: translateY(20px);
                        background-color: rgba(255, 255, 255, 0.6);
                        color: #00796b;
                        padding: 12px 20px;
                        border-radius: 8px;
                        text-align: center;
                        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
                        font-family: sans-serif;
                        font-size: 14px;
                        opacity: 0;
                        max-width: 80%;
                        transition: opacity 0.5s ease, transform 0.5s ease;
                        z-index: 9999;
                }

                .info-alert.show {
                        opacity: 1;
                        transform: translateY(0);
                }

                #customAlert {
                        position: fixed;
                        top: 50%;
                        left: 50%;
                        transform: translate(-50%, -50%);
                        z-index: 1001;
                        display: none;
                        color: var(--text-bright);
                        padding: 18px;
                        border-radius: 12px;
                        max-width: 90%;
                        width: 20%;
                        text-align: center;
                        backdrop-filter: blur(6px);
                        -webkit-backdrop-filter: blur(6px);
                        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
                        border: 1px solid rgba(255, 255, 255, 0.06);
                }

                /* ensure message area centers and gives breathing room */
                #customAlert #alertText {
                        padding: 8px 10px;
                        text-align: center;
                }

                /* add clear space above the button and stabilize its size */
                #customAlert #customAlertOk {
                        margin-top: 14px;
                        min-width: 120px;
                        padding: 10px 24px;
                        border-radius: 24px;
                }

                /* Dark (bitter) mode */
                body:not(.sweet-mode) #customAlert {
                        background: rgba(37, 26, 43, 0.86);
                        border-color: rgba(255, 255, 255, 0.06);
                }

                /* Sweet mode */
                body.sweet-mode #customAlert {
                        background: rgba(255, 255, 255, 0.92);
                        color: var(--text-bright);
                        border-color: rgba(155, 93, 229, 0.08);
                        box-shadow: 0 8px 24px rgba(155, 93, 229, 0.06);
                }

                #overlay {
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        background: rgba(0, 0, 0, 0.3);
                        backdrop-filter: blur(5px);
                        /* optional: blur the background */
                        -webkit-backdrop-filter: blur(5px);
                        z-index: 1000;
                        display: none;
                }

                .modal-overlay {
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100vw;
                        height: 100vh;
                        background-color: rgba(0, 0, 0, 0.5);
                        display: none;
                        align-items: center;
                        justify-content: center;
                        z-index: 1000;
                }

                .modal-overlay.show {
                        display: flex;
                }

                .modal-content {
                        background-color: #fff;
                        padding: 10px 10px;
                        border-radius: 10px;
                        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
                        max-width: 500px;
                        width: 90%;
                        text-align: center;
                        position: relative;
                }

                #ParsedTables {
                        display: flex;
                        flex-wrap: wrap;
                        gap: 20px;
                        margin-bottom: 30px;
                }

                /*

                /* Apply json table styles to MTI outputs */
                #json-output,
                #requestTable,
                #responseTable {
                        width: 100%;
                        max-width: 100%;
                        margin-bottom: 80px;
                        overflow-x: auto;
                        /* border: 1px solid var(--table-border); */
                        background: var(--table-bg);
                        margin: 24px 0 80px;
                        border-radius: 14px;
                        font-family: monospace;
                }

                #json-output table,
                #requestTable table,
                #responseTable table {
                        width: 100%;
                        table-layout: auto;
                        border-collapse: collapse;
                        min-width: 600px;
                        box-shadow: inset 0 0 0 1px var(--table-border);
                        border: 1px solid var(--table-border);
                }

                #json-output td,
                #json-output th,
                #requestTable td,
                #requestTable th,
                #responseTable td,
                #responseTable th {
                        word-break: break-word;
                        overflow-wrap: anywhere;
                        padding: 8px;
                        border: 1px solid var(--table-border);
                        border-bottom: 2px solid var(--table-border-strong);



                }



                #json-output th,
                #requestTable th,
                #responseTable th {
                        background: var(--table-head-bg);
                        /* color: var(--table-text);
                        font-weight: 700; */
                        padding: 8px;
                        color: var(--table-header-text);
                        font-weight: 700;
                }


                #json-output td,
                #requestTable td,
                #responseTable td {
                        color: var(--table-row-text);
                }


                #json-output tr:nth-child(even),
                #requestTable tr:nth-child(even),
                #responseTable tr:nth-child(even) {
                        background: var(--table-row-even);
                }

                #json-output tr:nth-child(odd),
                #requestTable tr:nth-child(odd),
                #responseTable tr:nth-child(odd) {
                        background: var(--table-row-odd);
                }

                #json-output th.key-column,
                #requestTable th.key-column,
                #responseTable th.key-column {
                        width: 30%;
                }

                #json-output th.value-column,
                #requestTable th.value-column,
                #responseTable th.value-column {
                        width: 70%;
                }

                /* ---------- TAB BUTTONS ---------- */
                .tab-buttons {
                        display: flex;
                        border-bottom: 1px solid #ddd;
                }

                .tab-buttons button {
                        flex: 0.45;
                        padding: 5px;
                        background: #00AFDA;
                        border: none;
                        border-right: 1px solid #ddd;
                        cursor: pointer;
                        font-size: 12px;
                        transition: 0.2s;
                        overflow-x: auto;
                }

                .tab-buttons button:last-child {
                        border-right: none;
                }

                .tab-buttons button.active {
                        background: #004F6B;
                        /* makes it appear lifted */
                }

                .tab-buttons button:hover {
                        background: #004F6B;
                }

                /* ---------- CONTENT AREA ---------- */
                .tab-content {
                        display: none;
                        padding: 20px;
                        animation: fade 0.3s ease;
                        height: auto;
                        width: auto;
                }

                .tab-content.active {
                        display: block;
                }

                .tab-text h4 {
                        font-size: 12px;
                        letter-spacing: 1px;
                        color: #777;
                        margin-bottom: 6px;
                }

                .tab-text h2 {
                        margin: 0;
                        font-size: 24px;
                }

                .tab-container {
                        font-family: Arial, sans-serif;
                        background: transparent;
                }

                .tabs {
                        list-style: none;
                        padding: 0;
                        display: flex;
                        border-bottom: 2px solid #ccc;
                        margin-bottom: 10px;
                }

                .tab {
                        padding: 10px 20px;
                        cursor: pointer;
                        border: none;
                        border-bottom: none;
                        background: #f1f1f1;
                        margin-right: 5px;

                        border-top-left-radius: 20px;
                        border-top-right-radius: 20px;

                }

                .tab.active {
                        background: #fff;
                        font-weight: bold;
                        border-top: 2px solid #0078D7;
                        border-left: 2px solid #0078D7;
                        border-right: 2px solid #0078D7;
                }

                .tab-content {
                        border: none;
                        padding: 15px;
                        background: transparent;
                }


                /* Tab base */
                .tabs .tab {
                        padding: 10px 20px;
                        cursor: pointer;
                        display: inline-block;
                        border: 1px solid transparent;
                        border-bottom: none;
                        border-top-left-radius: 15px;
                        border-top-right-radius: 15px;
                        transition: filter .12s ease, transform .12s ease, box-shadow .12s ease, opacity .12s ease;
                        opacity: 0.9;
                }

                /* Inactive (bitter / sweet follow .btn colors) */
                body:not(.sweet-mode) .tabs .tab {
                        background: #4C3A63;
                        color: #fff;
                        border-color: rgba(255, 255, 255, 0.12);
                }

                body.sweet-mode .tabs .tab {
                        background: #7aaec2;
                        color: #fff;
                        border: 1px solid #6da3b8;
                }

                /* Active: same hue but darker (no new color) */
                .tabs .tab.active {
                        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
                        filter: brightness(0.80);
                        opacity: 1;
                }
        </style>
</head>
