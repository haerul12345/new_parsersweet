        <style>
                :root {
                        --bg-start: #fff5fa;
                        --bg-end: #eef4ff;
                        --card-bg: #ffffff;
                        --primary: #ff4d8d;
                        --secondary: #a855f7;
                        --accent: #22c55e;
                        --text-bright: #31243f;
                        --text: #222;
                        --border-color: rgba(255, 255, 255, 0.05);

                        --font-family: 'Space Grotesk', sans-serif;

                        /* Candy Accents */
                        --flavor-strawberry: #ff4757;
                        --flavor-mint: #2ed573;
                        --flavor-blueberry: #1e90ff;
                        --flavor-grape: #9b5de5;
                        --flavor-lemon: #ffa502;
                        --flavor-peach: #ff6b81;

                        --content-width: 90%;
                }

                body {
                        min-height: 100vh;
                        display: flex;
                        flex-direction: column;
                        justify-content: flex-start;
                        align-items: center;
                        padding: 40px 20px;

                        background:
                                linear-gradient(135deg,
                                        var(--bg-start),
                                        var(--bg-end));

                        transition: background 0.3s ease, color 0.3s ease;
                        font-family: var(--font-family);
                }

                .utility-bar {
                        width: var(--content-width);
                        display: flex;
                        align-items: center;
                        margin: 0 auto 15px;
                }

                .utility-right {
                        margin-left: auto;
                        /* pushes this group to the right */
                        display: flex;
                        align-items: center;
                        gap: 12px;
                }

                .utility-bar,
                .container {
                        width: var(--content-width);
                        margin-left: auto;
                        margin-right: auto;
                }

                .theme-selector {
                        background: var(--card-bg);
                        border: 1px solid var(--card-bg);
                        border-radius: 15px;
                        padding: 8px 18px;

                        height: 40px;
                        box-sizing: border-box;

                        color: var(--text-bright);
                        font-family: inherit;
                        font-size: 0.85rem;
                        font-weight: 600;
                        cursor: pointer;
                        border: 1px solid color-mix(in srgb, var(--text) 20%, transparent);
                }

                .theme-selector:disabled {
                        opacity: 0.5;
                        cursor: not-allowed;
                }

                .theme-selector:focus {
                        outline: none;
                }

                .flavor-toggle {
                        /* background: var(--card-bg); */

                        background: linear-gradient(135deg,
                                        var(--primary),
                                        var(--secondary));

                        border: 1px solid var(--border-color);
                        padding: 8px 18px;
                        border-radius: 20px;
                        color: var(--text-bright);
                        font-family: inherit;
                        font-size: 0.85rem;
                        font-weight: 500;
                        height: 40px;
                        cursor: pointer;
                        display: flex;
                        align-items: center;
                        gap: 8px;
                        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
                        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                        white-space: nowrap;
                }


                body:not(.sweet-mode) .flavor-toggle {
                        filter: brightness(0.85);
                }

                .flavor-toggle:hover {
                        transform: scale(1.05);
                        border-color: rgba(155, 93, 229, 0.6);
                        /* background: var(--card-hover-bg); */
                        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
                }

                body.sweet-mode .flavor-toggle:hover {
                        transform: scale(1.05);
                        /* background: var(--card-hover-bg); */
                        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
                }

                .page-wrapper {
                        width: 100%;
                        max-width: 100%;
                        margin: 0 auto;
                        color: var(--text);
                }

                .container {
                        max-width: 90%;
                        width: 100%;
                        margin: 0 auto;
                        background: var(--card);
                        border-radius: 32px;
                        border: 1px solid var(--border-color);
                        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
                        border-top: 1px solid var(--border-color);
                        border-right: 1px solid var(--border-color);
                        border-bottom: 1px solid var(--border-color);
                        border-left: 1px solid var(--border-color);
                        position: relative;
                        z-index: 1;

                        box-sizing: border-box;
                        padding: 30px;

                        color: var(--text);
                }

                .flex-container {
                        display: flex;
                        gap: 20px;
                        /* Increased gap between input and output */
                }

                .input-container {
                        flex: 1;
                        display: flex;
                        flex-direction: column;
                        gap: 20px;
                        width: 50%;
                        /* Set width to half */
                }

                textarea {
                        resize: vertical;
                        width: 100%;
                        min-height: 120px;
                }

                h1 {
                        margin-bottom: 12px;
                        color: var(--text);
                }

                p {
                        color: var(--text-muted);
                        line-height: 1.6;
                }

                .btn {
                        padding: 12px 24px;
                        border: 1px solid var(--border-color);
                        border-radius: 30px;
                        font-size: 1em;
                        cursor: pointer;
                        transition: transform 0.18s ease, background 0.22s ease, border-color 0.18s ease;
                        background: var(--primary);
                        color: var(--text-bright);
                }

                body:not(.sweet-mode) .btn,
                body:not(.sweet-mode) #copy-button {

                        background: var(--primary);
                        color: white;
                        border-color: rgba(255, 255, 255, 0.12);
                }

                body.sweet-mode .btn,
                body.sweet-mode #copy-button {
                        background: var(--primary);
                        color: white;
                        border: 1px solid #6da3b8;
                }

                #copy-button {
                        display: none;
                        margin-left: 20px;
                        padding: 12px 24px;
                        border: 1px solid var(--border-color);
                        border-radius: 30px;
                        background: var(--card-bg);
                        color: var(--text-bright);
                        cursor: pointer;
                        transition: transform 0.18s ease, background 0.22s ease, border-color 0.18s ease;
                }

                /* hover states for buttons */
                .btn:hover,
                #copy-button:hover {
                        transform: scale(1.05);
                        background: var(--card-hover-bg);
                        border-color: rgba(155, 93, 229, 0.35);
                        color: var(--text-bright);
                        filter: brightness(0.80);
                }

                .info-alert {
                        position: fixed;
                        bottom: 30px;
                        right: 140px;
                        transform: translate(-50%);
                        transform: translateY(20px);
                        background-color: rgba(255, 255, 255, 0.6);
                        color: #00796b;
                        padding: 12px 20px;
                        border-radius: 8px;
                        text-align: center;
                        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
                        font-family: sans-serif;
                        font-size: 14px;
                        opacity: 0;
                        max-width: 80%;
                        transition: opacity 0.5s ease, transform 0.5s ease;
                        z-index: 9999;
                }

                .info-alert.show {
                        opacity: 1;
                        transform: translateY(0);
                }

                #customAlert {
                        position: fixed;
                        top: 50%;
                        left: 50%;
                        transform: translate(-50%, -50%);
                        z-index: 1001;
                        display: none;
                        color: var(--text);
                        padding: 18px;
                        border-radius: 12px;
                        max-width: 90%;
                        width: 20%;
                        text-align: center;
                        backdrop-filter: blur(6px);
                        -webkit-backdrop-filter: blur(6px);
                        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
                        border: 1px solid rgba(255, 255, 255, 0.06);
                }

                /* ensure message area centers and gives breathing room */
                #customAlert #alertText {
                        padding: 8px 10px;
                        text-align: center;
                }

                /* add clear space above the button and stabilize its size */
                #customAlert #customAlertOk {
                        margin-top: 14px;
                        min-width: 120px;
                        padding: 10px 24px;
                        border-radius: 24px;
                }

                /* Dark (bitter) mode */
                body:not(.sweet-mode) #customAlert {
                        /* background: rgba(37, 26, 43, 0.86); */
                        background:
                                linear-gradient(135deg,
                                        var(--bg-start),
                                        var(--bg-end));
                        border-color: rgba(255, 255, 255, 0.06);
                }

                /* Sweet mode */
                body.sweet-mode #customAlert {
                        /* background: rgba(255, 255, 255, 0.92); */
                        background:
                                linear-gradient(135deg,
                                        var(--bg-start),
                                        var(--bg-end));
                        color: var(--text);
                        border-color: rgba(155, 93, 229, 0.08);
                        box-shadow: 0 8px 24px rgba(155, 93, 229, 0.06);
                }

                #overlay {
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        background: rgba(0, 0, 0, 0.3);
                        backdrop-filter: blur(5px);
                        /* optional: blur the background */
                        -webkit-backdrop-filter: blur(5px);
                        z-index: 1000;
                        display: none;
                }

                .modal-overlay {
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100vw;
                        height: 100vh;
                        background-color: rgba(0, 0, 0, 0.5);
                        display: none;
                        align-items: center;
                        justify-content: center;
                        z-index: 1000;
                }

                .modal-overlay.show {
                        display: flex;
                }

                .modal-content {
                        background-color: #fff;
                        padding: 10px 10px;
                        border-radius: 10px;
                        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
                        max-width: 500px;
                        width: 90%;
                        text-align: center;
                        position: relative;
                }

                #ParsedTables {
                        display: flex;
                        flex-wrap: wrap;
                        gap: 20px;
                        margin-bottom: 30px;
                }

                /* Apply json table styles to MTI outputs */
                #json-output,
                #requestTable,
                #responseTable {
                        width: 100%;
                        max-width: 100%;
                        margin-bottom: 80px;
                        overflow-x: auto;
                        border: 1px solid var(--table-border);
                        background: var(--table-bg);
                        margin: 24px 0 80px;
                        border-radius: 14px;
                        font-family: monospace;
                }

                #json-output table,
                #requestTable table,
                #responseTable table {
                        width: 100%;
                        table-layout: auto;
                        border-collapse: collapse;
                        min-width: 600px;
                        box-shadow: inset 0 0 0 1px var(--table-border);
                        border: 1px solid var(--table-border);
                }

                #json-output td,
                #json-output th,
                #requestTable td,
                #requestTable th,
                #responseTable td,
                #responseTable th {
                        word-break: break-word;
                        overflow-wrap: anywhere;
                        padding: 8px;
                        border: 1px solid black;
                        border-bottom: 2px solid black;

                }



                #json-output th,
                #requestTable th,
                #responseTable th {
                        background: var(--sweet-primary);
                        /* color: var(--table-text);
                        font-weight: 700; */
                        padding: 8px;
                        color: white;
                        font-weight: 700;
                }

                #json-output td,
                #requestTable td,
                #responseTable td {
                        color: #333;
                }

                #json-output tr:nth-child(even),
                #requestTable tr:nth-child(even),
                #responseTable tr:nth-child(even) {
                        background: color-mix(in srgb,
                                        var(--sweet-primary) 15%,
                                        white);
                }

                #json-output tr:nth-child(odd),
                #requestTable tr:nth-child(odd),
                #responseTable tr:nth-child(odd) {
                        background: white;
                }

                #json-output th.key-column,
                #requestTable th.key-column,
                #responseTable th.key-column {
                        width: 30%;
                }

                #json-output th.value-column,
                #requestTable th.value-column,
                #responseTable th.value-column {
                        width: 70%;
                }

                /* ---------- TAB BUTTONS ---------- */
                .tab-buttons {
                        display: flex;
                        border-bottom: 1px solid #ddd;
                }

                .tab-buttons button {
                        flex: 0.45;
                        padding: 5px;
                        background: var(--primary);
                        color: white;

                        border: none;
                        border-right: 1px solid #ddd;
                        cursor: pointer;
                        font-size: 12px;
                        transition: 0.2s;
                        overflow-x: auto;
                }

                .tab-buttons button:last-child {
                        border-right: none;
                }

                .tab-buttons button.active {
                        background: var(--primary);
                        /* makes it appear lifted */
                }

                .tab-buttons button:hover {
                        background: var(--primary);
                }

                /* ---------- CONTENT AREA ---------- */
                .tab-content {
                        display: none;
                        padding: 20px;
                        animation: fade 0.3s ease;
                        height: auto;
                        width: auto;
                }

                .tab-content.active {
                        display: block;
                }

                .tab-text h4 {
                        font-size: 12px;
                        letter-spacing: 1px;
                        color: #777;
                        margin-bottom: 6px;
                }

                .tab-text h2 {
                        margin: 0;
                        font-size: 24px;
                }

                .tab-container {
                        font-family: Arial, sans-serif;
                        background: transparent;
                }

                .tabs {
                        list-style: none;
                        padding: 0;
                        display: flex;
                        border-bottom: 2px solid #ccc;
                        margin-bottom: 10px;
                }

                .tab {
                        padding: 10px 20px;
                        cursor: pointer;
                        border: none;
                        border-bottom: none;
                        background: #f1f1f1;
                        margin-right: 5px;

                        border-top-left-radius: 20px;
                        border-top-right-radius: 20px;

                }

                .tab.active {
                        background: #fff;
                        font-weight: bold;
                        border-top: 2px solid #0078D7;
                        border-left: 2px solid #0078D7;
                        border-right: 2px solid #0078D7;
                }

                .tab-content {
                        border: none;
                        padding: 15px;
                        background: transparent;
                }


                /* Tab base */
                .tabs .tab {
                        padding: 10px 20px;
                        cursor: pointer;
                        display: inline-block;
                        border: 1px solid transparent;
                        border-bottom: none;
                        border-top-left-radius: 15px;
                        border-top-right-radius: 15px;
                        transition: filter .12s ease, transform .12s ease, box-shadow .12s ease, opacity .12s ease;
                        opacity: 0.9;
                }

                /* Inactive (bitter / sweet follow .btn colors) */
                body:not(.sweet-mode) .tabs .tab {
                        background: var(--primary);
                        color: #fff;
                        border-color: rgba(255, 255, 255, 0.12);
                }

                body.sweet-mode .tabs .tab {
                        background: var(--primary);
                        color: #fff;
                        border: 1px solid #6da3b8;
                }

                /* Active: same hue but darker (no new color) */
                .tabs .tab.active {
                        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
                        filter: brightness(0.80);
                        opacity: 1;
                }


                .sweet-notice {
                        display: flex;
                        align-items: center;
                        gap: 20px;
                        margin: 35px 0 40px;
                        padding: 22px 24px;
                        border-radius: 20px;

                        background: linear-gradient(135deg,
                                        rgba(255, 107, 129, 0.12),
                                        rgba(155, 93, 229, 0.12));

                        border: 1px solid rgba(255, 255, 255, 0.08);
                }

                .notice-icon {
                        font-size: 5rem;
                        flex-shrink: 0;
                        animation: bounce 2s infinite;
                }

                .notice-content h3 {
                        margin-bottom: 8px;
                        color: var(--text);
                        font-size: 1.15rem;
                }

                .notice-content p {
                        color: var(--text);
                        line-height: 1.6;
                        margin-bottom: 12px;
                }

                .notice-badge {
                        display: inline-block;
                        padding: 6px 12px;
                        border-radius: 999px;
                        font-size: 0.75rem;
                        font-weight: 700;
                        letter-spacing: 1px;
                        text-transform: uppercase;

                        background: linear-gradient(135deg,
                                        #ff4757,
                                        #9b5de5);

                        color: white;
                }

                @keyframes bounce {

                        0%,
                        20%,
                        50%,
                        80%,
                        100% {
                                transform: translateY(0);
                        }

                        40% {
                                transform: translateY(-6px);
                        }

                        60% {
                                transform: translateY(-3px);
                        }
                }

                .tooltip-border {
                        cursor: pointer;
                        border-bottom: 1px dotted #333;
                }

                .back-button {
                        display: inline-flex;
                        align-items: center;
                        gap: 8px;

                        background: none;
                        border: none;
                        padding: 0;

                        font: inherit;
                        font-size: 0.9rem;
                        font-weight: 600;

                        cursor: pointer;
                        transition: all 0.2s ease;
                }

                body.sweet-mode .back-button {
                        color: var(--text-bright);
                }

                body:not(.sweet-mode) .back-button {
                        color: var(--text);
                }

                .back-button:hover {
                        opacity: 0.75;
                        transform: translateX(-3px);
                }

                .back-arrow {
                        font-size: 1.3rem;
                        line-height: 1;
                }

                .footer {
                        text-align: center;
                        margin-top: 30px;
                        color: var(--text);
                        opacity: .7;
                }

                /* --- Footer --- */
                footer {
                        margin-top: 40px;
                        text-align: center;
                        font-size: 0.85rem;
                        color: var(--text-muted);
                        letter-spacing: 0.5px;
                }

                #appToast {
                        background-color: var(--bg-start) !important;
                        color: var(--text) !important;
                        border-color: var(--text) !important;

                        width: fit-content;
                        max-width: none;

                        backdrop-filter: blur(10px);
                        -webkit-backdrop-filter: blur(10px);

                        border-radius: 12px;
                }
        </style>
</head>
