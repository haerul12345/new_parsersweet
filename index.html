<!DOCTYPE html>
<html>

<head>
        <title>ParserSweet Login</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
                rel="stylesheet">

</head>

<style>
        /* --- Themes Configurations --- */
        :root {
                --bg-start: #fff5fa;
                --bg-end: #eef4ff;
                --card-bg: #ffffff;
                --primary: #ff4d8d;
                --secondary: #a855f7;
                --accent: #22c55e;
                --text-bright: #31243f;
                --text: #222;
                --border-color: rgba(255, 255, 255, 0.05);

                --font-family: 'Space Grotesk', sans-serif;

                /* Candy Accents */
                --flavor-strawberry: #ff4757;
                --flavor-mint: #2ed573;
                --flavor-blueberry: #1e90ff;
                --flavor-grape: #9b5de5;
                --flavor-lemon: #ffa502;
                --flavor-peach: #ff6b81;
        }

        body {
                background:
                        linear-gradient(135deg,
                                var(--bg-start),
                                var(--bg-end));
                font-family: var(--font-family);
        }

        body.bitter {
                --card-border: rgba(255, 255, 255, 0.692);
        }


        /* --- Brand Header --- */
        .brand-header {
                text-align: center;
                margin-bottom: 45px;
        }

        .brand-title {
                font-size: 4rem;
                font-weight: 700;
                letter-spacing: -1px;
                margin-bottom: 10px;
                background: var(--text);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                transition: background 0.5s ease;
        }

        .brand-title-wrapper {
                display: flex;
                align-items: center;
                /* vertically align logo with text */
                justify-content: center;

                gap: 16px;
                width: fit-content;

                /* space between text and logo */
        }


        .brand-title {
                margin: 0;
                font-size: 5rem;
                line-height: 1;
        }

        .brand-title span {
                background: linear-gradient(90deg,
                                #ff4d79,
                                #e11d48,
                                #8b5cf6,
                                #e11d48,
                                #ff4d79,
                                #e11d48,
                                #8b5cf6,
                                #e11d48,
                                #ff4d79);
                background-size: 300% 100%;
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
                animation: sweet-run 6s linear infinite;
        }



        @keyframes sweet-run {
                0% {
                        background-position: 200% 50%;
                }

                100% {
                        background-position: 0% 50%;
                }
        }

        @keyframes sweet-run {
                from {
                        background-position: 0% 50%;
                }

                to {
                        background-position: -200% 50%;
                }
        }

        /* .logo {
                width: 120px;
                height: auto;
        } */

        .logo {
                /* width: 20% !important;
                height: auto; */

                width: 120px;
                height: 120px;
                flex-shrink: 0;
                object-fit: contain;

                animation:
                        pulse 3s infinite ease-in-out,
                        hueRotate 5s linear infinite,
                        sway 5s ease-in-out infinite;

        }


        @keyframes sway {

                0%,
                100% {
                        transform: rotate(-2deg);
                }

                50% {
                        transform: rotate(2deg);
                }
        }

        @keyframes pulse {

                0%,
                100% {
                        filter: drop-shadow(0 0 5px #8b5cf6);
                }

                50% {
                        filter: drop-shadow(0 0 20px #06b6d4);
                }
        }


        @keyframes hueRotate {
                from {
                        filter: hue-rotate(0deg);
                }

                to {
                        filter: hue-rotate(360deg);
                }
        }

        .passcode-container {
                position: fixed;
                inset: 0;
                display: flex;
                flex-direction: column;
                justify-content: center;
                /* vertical center */
                align-items: center;
                /* horizontal center */
                gap: 40px;
        }
</style>

<body>

        <div class="passcode-container">
                <div class="brand-title-wrapper">
                        <h1 class="brand-title">
                                Parser<span>Sweet</span>
                        </h1>
                        <img src="assets/parsersweet-logo.png" altbody class="logo">
                </div>

                <div
                        style="width: 380px; background: var(--card);padding:30px 40px;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.13);text-align:center;">
                        <h2 style="            
                    margin: 0 0 20px 0; color: var(--text);
                    ">Enter Passcode<br></h2>
                        <input type="password" id="passcode-input"
                                style="padding:10px;font-size:1.1em;border-radius:6px;border:1px solid #ccc;">
                        <button id="passcode-submit" style="margin-left:10px;padding:10px 10px;border-radius:6px;border:none;  background: linear-gradient(180deg,
                    var(--primary),
                    var(--secondary));color:#fff;font-size:1em;">Submit</button>
                        <div id="passcode-error" style="color:red;margin-top:10px;"></div>
                </div>

        </div>

        <script>


                // Helpers
                function toHex(buf) {
                        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
                }
                function hexToBuffer(hex) {
                        const bytes = new Uint8Array(hex.length / 2);
                        for (let i = 0; i < bytes.length; i++) bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
                        return bytes.buffer;
                }
                function constantTimeEqual(a, b) {
                        if (a.length !== b.length) return false;
                        let res = 0;
                        for (let i = 0; i < a.length; i++) res |= a.charCodeAt(i) ^ b.charCodeAt(i);
                        return res === 0;
                }

                // PBKDF2 derive: returns hex key
                async function pbkdf2Hex(password, saltHex, iterations = 200000, keyLen = 32) {
                        const enc = new TextEncoder();
                        const keyMaterial = await crypto.subtle.importKey(
                                'raw',
                                enc.encode(password),
                                { name: 'PBKDF2' },
                                false,
                                ['deriveBits']
                        );
                        const salt = hexToBuffer(saltHex);
                        const bits = await crypto.subtle.deriveBits(
                                { name: 'PBKDF2', hash: 'SHA-256', salt, iterations },
                                keyMaterial,
                                keyLen * 8
                        );
                        return toHex(bits);
                }

                const stored = {
                        iterations: 200000,
                        salt: "e0490b70b8f422056cc53ce6b7670792",
                        hash: "11c5ab0ea887313eafcb37005f028830cbc3cfe728c0f46c6473121d203f7798"
                };

                // On submit: derive and compare in constant time

                document.getElementById('passcode-submit').onclick = async function () {
                        const pass = document.getElementById('passcode-input').value;
                        if (!pass.trim()) {
                                document.getElementById('passcode-error').innerText = "Please enter passcode";
                                document.getElementById('passcode-input').focus();

                                return;
                        }
                        const derived = await pbkdf2Hex(pass.trim(), stored.salt, stored.iterations, 32);
                        if (constantTimeEqual(derived, stored.hash)) {
                                // Save login state
                                localStorage.setItem("authenticated", "true");

                                // Redirect to flavor menu
                                window.location.href = "menu.html";

                                setTimeout(() => {
                                        const firstInput = document.querySelector('input,textarea');
                                        if (firstInput) firstInput.focus();
                                }, 100);

                        } else {
                                document.getElementById('passcode-error').innerText = "Wrong passcode";
                                document.getElementById('passcode-input').value = "";
                                document.getElementById('passcode-input').focus();

                        }
                };

                document.getElementById('passcode-input').addEventListener('input', function () {
                        document.getElementById('passcode-error').innerText = "";
                });

                document.getElementById('passcode-input').addEventListener('keydown', function (e) {
                        if (e.key === "Enter") document.getElementById('passcode-submit').click();
                });


                document.addEventListener("DOMContentLoaded", function () {


                        const isAuthenticated =
                                sessionStorage.getItem("authenticated") === "true";

                        console.log(
                                `[AUTH] Login page loaded. Authenticated = ${isAuthenticated}`
                        );

                        if (isAuthenticated) {
                                console.log(
                                        "[AUTH] Existing session found. Redirecting to menu.html"
                                );
                                window.location.href = "menu.html";
                        }


                });


        </script>

        <script type="module" src="script.js"></script>
        <script type="module" src="theme.js"></script>

</body>

</html>
