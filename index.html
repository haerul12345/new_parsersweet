        <script>


                window.addEventListener("load", () => {
                        document.getElementById("passcode-input")?.focus();
                });


                // Helpers
                function toHex(buf) {
                        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
                }
                function hexToBuffer(hex) {
                        const bytes = new Uint8Array(hex.length / 2);
                        for (let i = 0; i < bytes.length; i++) bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
                        return bytes.buffer;
                }
                function constantTimeEqual(a, b) {
                        if (a.length !== b.length) return false;
                        let res = 0;
                        for (let i = 0; i < a.length; i++) res |= a.charCodeAt(i) ^ b.charCodeAt(i);
                        return res === 0;
                }

                // PBKDF2 derive: returns hex key
                async function pbkdf2Hex(password, saltHex, iterations = 200000, keyLen = 32) {
                        const enc = new TextEncoder();
                        const keyMaterial = await crypto.subtle.importKey(
                                'raw',
                                enc.encode(password),
                                { name: 'PBKDF2' },
                                false,
                                ['deriveBits']
                        );
                        const salt = hexToBuffer(saltHex);
                        const bits = await crypto.subtle.deriveBits(
                                { name: 'PBKDF2', hash: 'SHA-256', salt, iterations },
                                keyMaterial,
                                keyLen * 8
                        );
                        return toHex(bits);
                }

                const stored = {
                        iterations: 200000,
                        salt: "e0490b70b8f422056cc53ce6b7670792",
                        hash: "11c5ab0ea887313eafcb37005f028830cbc3cfe728c0f46c6473121d203f7798"
                };

                // On submit: derive and compare in constant time

                document.getElementById('passcode-submit').onclick = async function () {
                        const pass = document.getElementById('passcode-input').value;
                        if (!pass.trim()) {
                                document.getElementById('passcode-error').innerText = "Please enter passcode";
                                document.getElementById('passcode-input').focus();

                                return;
                        }
                        const derived = await pbkdf2Hex(pass.trim(), stored.salt, stored.iterations, 32);
                        if (constantTimeEqual(derived, stored.hash)) {
                                // Save login state
                                localStorage.setItem("authenticated", "true");

                                // Redirect to flavor menu
                                window.location.href = "menu.html";

                                setTimeout(() => {
                                        const firstInput = document.querySelector('input,textarea');
                                        if (firstInput) firstInput.focus();
                                }, 100);

                        } else {
                                document.getElementById('passcode-error').innerText = "Wrong passcode";
                                document.getElementById('passcode-input').value = "";
                                document.getElementById('passcode-input').focus();

                        }
                };

                document.getElementById('passcode-input').addEventListener('input', function () {
                        document.getElementById('passcode-error').innerText = "";
                });

                document.getElementById('passcode-input').addEventListener('keydown', function (e) {
                        if (e.key === "Enter") document.getElementById('passcode-submit').click();
                });


                document.addEventListener("DOMContentLoaded", function () {


                        const isAuthenticated =
                                sessionStorage.getItem("authenticated") === "true";

                        console.log(
                                `[AUTH] Login page loaded. Authenticated = ${isAuthenticated}`
                        );

                        if (isAuthenticated) {
                                console.log(
                                        "[AUTH] Existing session found. Redirecting to menu.html"
                                );
                                window.location.href = "menu.html";
                        }


                });

                function typeQuote(text) {
                        let i = 0;
                        quoteElement.textContent = "";

                        const timer = setInterval(() => {
                                quoteElement.textContent += text.charAt(i);
                                i++;

                                if (i >= text.length) {
                                        clearInterval(timer);
                                }
                        }, 30);
                }

                let typingToken = 0;

                let lastQuoteIndex = -1;
                document.addEventListener("DOMContentLoaded", () => {

                        document.addEventListener("visibilitychange", async () => {

                                if (!document.hidden) {
                                        forceNewQuote();
                                }
                        });

                        const quoteElement =
                                document.getElementById("daily-quote");

                        let currentQuote = "";
                        let quoteRunning = false;

                        function sleep(ms) {
                                return new Promise(resolve => setTimeout(resolve, ms));
                        }

                        let quoteToken = 0;

                        async function typeText(text, speed = 40) {

                                const token = quoteToken;

                                quoteElement.textContent = "";

                                for (const ch of text) {

                                        if (token !== quoteToken) return false;

                                        quoteElement.textContent += ch;

                                        await sleep(speed);
                                }

                                return true;
                        }

                        async function deleteText(speed = 30) {

                                const token = quoteToken;

                                while (quoteElement.textContent.length > 0) {

                                        if (token !== quoteToken) return false;

                                        quoteElement.textContent =
                                                quoteElement.textContent.slice(0, -1);

                                        await sleep(speed);
                                }

                                return true;
                        }

                        function getRandomQuote() {

                                let index;

                                do {
                                        index = Math.floor(
                                                Math.random() * window.quotes.length
                                        );
                                } while (index === lastQuoteIndex);

                                lastQuoteIndex = index;

                                return window.quotes[index];
                        }

                        async function forceNewQuote() {

                                quoteToken++;

                                currentQuote = "";
                                quoteElement.textContent = "";

                                const randomQuote =
                                        `" ${getRandomQuote()} "`;

                                currentQuote = randomQuote;

                                await typeText(randomQuote);
                        }

                        async function showRandomQuote() {

                                const token = quoteToken;

                                if (currentQuote !== "") {

                                        const deleted = await deleteText();

                                        if (!deleted || token !== quoteToken) {
                                                return;
                                        }
                                }

                                const randomQuote =
                                        `" ${getRandomQuote()} "`;

                                currentQuote = randomQuote;

                                await typeText(randomQuote);
                        }

                        let quoteLoopRunning = false;


                        async function quoteLoop() {

                                while (true) {

                                        await showRandomQuote();

                                        await sleep(6000);
                                }
                        }


                        quoteLoop();

                });

        </script>
