        <script>

                document.getElementById("app-version").textContent = `Version 1.1 © 2026 hji`;

                const MAX_IMAGES = 20;

                /* ================= Helpers (unchanged) ================= */
                function extractMessage(line) {
                        const fullHeader = /^(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}\.\d+)\s+\d+-\d+\s+\S+\s+\S+\s+[A-Z]\s{2}(.*)$/;
                        const shortHeader = /^(\d{2}:\d{2}:\d{2}\.\d+)\s+[A-Z]\s{2}(.*)$/;
                        let m = line.match(fullHeader);
                        if (m) return m[2].trim();
                        m = line.match(shortHeader);
                        if (m) return m[2].trim();
                        return line.trim();
                }

                function extractCustomerReceiptData(logText) {
                        if (!logText) return null;

                        const key = "customer_receipt_data=";
                        const lines = logText.split("\n");

                        let collecting = false;
                        let result = "";

                        for (let line of lines) {

                                if (!collecting) {
                                        const startIndex = line.indexOf(key);
                                        if (startIndex !== -1) {
                                                collecting = true;

                                                let part = line.substring(startIndex + key.length);

                                                const commaIndex = part.indexOf(",");
                                                if (commaIndex !== -1) {
                                                        result += part.substring(0, commaIndex);
                                                        break;
                                                } else {
                                                        result += part;
                                                }
                                        }

                                } else {
                                        // ✅ Remove BOTH short & long logcat prefixes
                                        const cleanedLine = line.replace(
                                                /^(?:\d{2}:\d{2}:\d{2}\.\d{3}|\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}\.\d{3}).*?\s[DIEVWA]\s+/,
                                                ""
                                        );

                                        const commaIndex = cleanedLine.indexOf(",");
                                        if (commaIndex !== -1) {
                                                result += cleanedLine.substring(0, commaIndex);
                                                break;
                                        } else {
                                                result += cleanedLine;
                                        }
                                }
                        }

                        // remove spaces and line breaks
                        return result.replace(/\s/g, "");
                }

                function processLog() {
                        const logText = document.getElementById("logInput").value.trim();

                        if (!logText) {
                                alert("Log input is empty.\nPlease paste logcat output first.");
                                return;
                        }

                        // ✅ Clear previous results (same style as formatLogs)
                        document.getElementById("outputBox").value = "";
                        const grid = document.getElementById("grid");
                        grid.innerHTML = "";

                        const imgCountEl = document.getElementById("imgCount");
                        imgCountEl.style.display = "none";
                        imgCountEl.textContent = "";

                        // ✅ Extract Base64
                        const base64 = extractCustomerReceiptData(logText);

                        if (!base64) {
                                alert("No customer_receipt_data found in logs.");
                                return;
                        }

                        const cleaned = base64.replace(/\s/g, "");

                        // ✅ Optional: detect image type
                        function detectImageType(b64) {
                                if (b64.startsWith("/9j/")) return "image/jpeg";
                                if (b64.startsWith("iVBOR")) return "image/png";
                                if (b64.startsWith("R0lGOD")) return "image/gif";
                                return "image/png";
                        }

                        const mimeType = detectImageType(cleaned);

                        // ✅ Create SAME tile style as existing viewer
                        const tile = document.createElement("div");
                        tile.className = "imgTile";

                        const img = document.createElement("img");
                        img.className = "multiImg";
                        img.src = `data:${mimeType};base64,` + cleaned;
                        img.alt = "Customer Receipt";

                        tile.appendChild(img);

                        // ✅ Copy button (reuse your logic)
                        // ✅ Copy button follows .btn theme
                        const copyBtn = document.createElement("button");
                        copyBtn.className = "btn";
                        copyBtn.textContent = "Copy Image";
                        copyBtn.style.marginTop = "8px";

                        copyBtn.onclick = async () => {
                                try {
                                        const byteCharacters = atob(cleaned);
                                        const byteNumbers = new Array(byteCharacters.length);

                                        for (let i = 0; i < byteCharacters.length; i++) {
                                                byteNumbers[i] = byteCharacters.charCodeAt(i);
                                        }

                                        const byteArray = new Uint8Array(byteNumbers);
                                        const blob = new Blob([byteArray], { type: mimeType });

                                        await navigator.clipboard.write([
                                                new ClipboardItem({ [mimeType]: blob })
                                        ]);

                                        copyBtn.textContent = "Copied ✔";
                                        setTimeout(() => (copyBtn.textContent = "Copy Image"), 1500);

                                } catch (err) {
                                        console.error(err);
                                        alert("Clipboard does not allow image copy in this browser.");
                                }
                        };

                        tile.appendChild(copyBtn);
                        grid.appendChild(tile);

                        // ✅ Update counter (same style)
                        imgCountEl.textContent = "1 image";
                        imgCountEl.style.display = "inline-block";

                        console.log("Customer receipt rendered");
                }


                function extractAllPrintDataBlocks(logText) {
                        const blocks = [];
                        const lines = logText.split("\n");
                        let current = [];
                        let inside = false;

                        for (const raw of lines) {
                                let line = extractMessage(raw);
                                if (line.includes("printData=")) {
                                        if (inside && current.length > 0) {
                                                blocks.push(current.join("\n"));
                                                current = [];
                                        }
                                        inside = true;
                                }

                                if (inside) {
                                        if (line.trim().startsWith("textPrintData=")) {
                                                inside = false;
                                                blocks.push(current.join("\n"));
                                                current = [];
                                                continue;
                                        }
                                        current.push(line);
                                }
                        }

                        if (current.length > 0) blocks.push(current.join("\n"));
                        return blocks;
                }

                function stripAfterTextPrintData(msg) {
                        return msg.split(",textPrintData=")[0];
                }

                function setThumbSize(px) {
                        document.documentElement.style.setProperty('--thumb-width', px + 'px');
                        document.getElementById('sizeReadout').textContent = px + ' px';
                }


                (function () {
                        const range = document.getElementById('thumbSize');
                        if (!range) return;

                        function updateRangeFill(el) {
                                const min = Number(el.min || 0);
                                const max = Number(el.max || 100);
                                const val = Number(el.value);
                                const pct = Math.round(((val - min) / (max - min)) * 100 * 100) / 100; // percent with 2dp

                                const styles = getComputedStyle(document.documentElement);
                                const accent = styles.getPropertyValue('--control-accent').trim() || '#14B8A6';
                                const unfilled = '#ffffff';

                                el.style.background = `linear-gradient(90deg, ${accent} ${pct}%, ${unfilled} ${pct}%)`;
                        }

                        // keep existing oninput behaviour but also update fill
                        range.addEventListener('input', (e) => {
                                updateRangeFill(e.target);
                        });

                        // initialize on load
                        updateRangeFill(range);
                })();

                /* ================= Paste Button ================= */

                /* =================== MAIN =================== */
                function formatLogs() {

                        const input = document.getElementById("logInput").value.trim();

                        if (input === "") {
                                alert("Log input is empty.\nPlease paste logcat output first.");
                                return;
                        }

                        // ✅ Clear previous results
                        document.getElementById("outputBox").value = "";
                        document.getElementById("grid").innerHTML = "";
                        document.getElementById("imgPreview").style.display = "none";
                        document.getElementById("imgPreview").src = "";

                        const imgCountEl = document.getElementById("imgCount");
                        imgCountEl.style.display = "none";
                        imgCountEl.textContent = "";

                        const grid = document.getElementById("grid");
                        const outputBox = document.getElementById("outputBox");

                        let images = [];

                        /* =========================
                           1. TRY printData (existing)
                        ========================= */
                        const blocks = extractAllPrintDataBlocks(input);

                        if (blocks.length > 0) {

                                blocks.forEach((block, index) => {
                                        let cleaned = block.replace(/^.*printData=/, "").replace(/\s+/g, "");
                                        cleaned = stripAfterTextPrintData(cleaned);
                                        cleaned = cleaned.replace(/\s+/g, "");

                                        images.push(cleaned);
                                        outputBox.value += `=== IMAGE ${index + 1} ===\n${cleaned}\n\n`;
                                });

                        } else {

                                /* =========================
                                   2. FALLBACK → customer_receipt_data
                                ========================= */
                                const base64 = extractCustomerReceiptData(input);

                                if (!base64) {
                                        alert("No valid receipt data found.\nSupports:\n- printData\n- customer_receipt_data");
                                        return;
                                }

                                images.push(base64.replace(/\s/g, ""));
                                outputBox.value = base64;
                        }

                        /* =========================
                           3. RENDER (same UI)
                        ========================= */

                        const LIMIT = 10;
                        const total = images.length;
                        const shown = Math.min(total, LIMIT);

                        function detectImageType(b64) {
                                if (b64.startsWith("/9j/")) return "image/jpeg";
                                if (b64.startsWith("iVBOR")) return "image/png";
                                if (b64.startsWith("R0lGOD")) return "image/gif";
                                return "image/png";
                        }

                        images.forEach((cleaned, index) => {
                                if (index >= LIMIT) return;

                                const mimeType = detectImageType(cleaned);

                                const tile = document.createElement("div");
                                tile.className = "imgTile";

                                const img = document.createElement("img");
                                img.className = "multiImg";
                                img.src = `data:${mimeType};base64,` + cleaned;
                                img.alt = `Image ${index + 1}`;
                                tile.appendChild(img);

                                const copyBtn = document.createElement("button");
                                copyBtn.className = "btn";
                                copyBtn.textContent = "Copy Image";
                                copyBtn.style.marginTop = "8px";

                                copyBtn.onclick = async () => {
                                        try {
                                                const byteCharacters = atob(cleaned);
                                                const byteNumbers = new Array(byteCharacters.length);

                                                for (let i = 0; i < byteCharacters.length; i++) {
                                                        byteNumbers[i] = byteCharacters.charCodeAt(i);
                                                }

                                                const byteArray = new Uint8Array(byteNumbers);
                                                const blob = new Blob([byteArray], { type: mimeType });

                                                await navigator.clipboard.write([
                                                        new ClipboardItem({ [mimeType]: blob })
                                                ]);

                                                copyBtn.textContent = "Copied ✔";
                                                setTimeout(() => (copyBtn.textContent = "Copy Image"), 1500);

                                        } catch (err) {
                                                console.error(err);
                                                alert("Clipboard does not allow image copy in this browser.");
                                        }
                                };

                                tile.appendChild(copyBtn);
                                grid.appendChild(tile);
                        });

                        /* =========================
                           4. COUNTER
                        ========================= */
                        if (shown > 0) {
                                imgCountEl.textContent =
                                        total <= LIMIT
                                                ? `${shown} image${shown === 1 ? "" : "s"}`
                                                : `${shown} of ${total} images`;

                                imgCountEl.style.display = "inline-block";
                        }

                        if (total > LIMIT) {
                                setTimeout(() => {
                                        alert(`Found ${total} receipts.\nShowing first ${LIMIT}.`);
                                }, 5);
                        }

                }

                (() => {
                        const THEME_STORAGE_KEY = 'parserSweetTheme';
                        const btn = document.getElementById('themeBtn');
                        const icon = document.getElementById('themeIcon');
                        const text = document.getElementById('themeText');

                        if (!btn) return;

                        function applyFlavor(isSweet) {
                                document.body.classList.toggle('sweet-mode', isSweet);
                                if (icon) icon.textContent = isSweet ? '🍫' : '🧁';
                                if (text) text.textContent = isSweet
                                        ? 'Switch to Bitter Mode'
                                        : 'Switch to Sweet Mode';
                        }

                        const saved = localStorage.getItem(THEME_STORAGE_KEY);
                        const isSweet = saved === 'sweet';
                        applyFlavor(isSweet);

                        btn.addEventListener('click', () => {
                                const nextSweet = !document.body.classList.contains('sweet-mode');
                                applyFlavor(nextSweet);
                                localStorage.setItem(THEME_STORAGE_KEY, nextSweet ? 'sweet' : 'bitter');
                        });
                })();
